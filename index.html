<!DOCTYPE html>
<html>

<head>
<title>Youth Remote Work Tracker</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f6f7fb;
color:#444;
}

/* COVER PAGE */

.cover{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(120deg,#ffd6e7,#d6f5ff,#e8ffd6);
}

.cover h1{
font-size:42px;
color:#444;
}

.cover p{
font-size:18px;
margin-top:10px;
}

.cover button{
margin-top:25px;
padding:14px 28px;
background:#7ea6ff;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

/* MAIN APP */

.app{
display:none;
padding:40px;
}

.section{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:25px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

/* INPUTS */

input,select{
padding:9px;
margin:6px;
border-radius:7px;
border:1px solid #ddd;
}

/* BUTTONS */

button{
padding:9px 16px;
border:none;
border-radius:8px;
cursor:pointer;
background:#9ee0b7;
}

/* TASK CARDS */

.task{
padding:14px;
margin-top:12px;
border-radius:10px;
background:#fff7fd;
border-left:6px solid #d7a6ff;
}

/* TASK STATUS COLORS */

.completed{
border-left:6px solid #7ed8a8;
background:#f1fff6;
}

.progress{
border-left:6px solid #7fb9ff;
background:#f3f8ff;
}

/* DELETE BUTTON */

.deleteBtn{
background:#ffb6b6;
margin-top:6px;
}

/* PROGRESS BAR */

.progressContainer{
height:22px;
background:#eee;
border-radius:12px;
margin-top:10px;
}

.progressBar{
height:100%;
background:linear-gradient(90deg,#7ed8a8,#7fb9ff);
border-radius:12px;
text-align:center;
font-size:12px;
color:white;
}

</style>

</head>

<body>

<!-- COVER PAGE -->

<div class="cover" id="cover">

<h1>Youth Remote Work Tracker</h1>

<p>Track tasks, progress and intern performance</p>

<button onclick="startApp()">Enter Dashboard</button>

</div>


<!-- MAIN APP -->

<div class="app" id="app">

<div class="section">

<h2>Intern Dashboard</h2>

<input id="internName" placeholder="Enter your name">

<button onclick="loadTasks()">View My Tasks</button>

<div id="progressArea"></div>

</div>


<div class="section">

<h2>Supervisor Panel</h2>

<input id="taskTitle" placeholder="Task title">

<input id="intern" placeholder="Intern name">

<input id="department" placeholder="Department">

<input type="date" id="deadline">

<select id="status">
<option>Pending</option>
<option>In Progress</option>
<option>Completed</option>
</select>

<input id="rating" type="number" min="1" max="5" placeholder="Rating">

<button onclick="addTask()">Add Task</button>

<br><br>

<input id="deptFilter" placeholder="Filter department">

<button onclick="filterDept()">Filter</button>

</div>


<div class="section">

<h2>Tasks</h2>

<div id="taskList"></div>

</div>

</div>


<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function save(){
localStorage.setItem("tasks", JSON.stringify(tasks));
}

function startApp(){
document.getElementById("cover").style.display="none";
document.getElementById("app").style.display="block";
displayTasks();
}

function addTask(){

let task={
title:taskTitle.value,
intern:intern.value,
department:department.value,
deadline:deadline.value,
status:status.value,
rating:rating.value
};

tasks.push(task);

save();

displayTasks();

}

function displayTasks(list=tasks){

taskList.innerHTML="";

list.forEach((t,i)=>{

let style="";

if(t.status==="Completed") style="completed";
if(t.status==="In Progress") style="progress";

taskList.innerHTML+=`

<div class="task ${style}">

<b>${t.title}</b><br>

Intern: ${t.intern}<br>

Department: ${t.department}<br>

Deadline: ${t.deadline}<br>

Status:

<select onchange="updateStatus(${i},this.value)">

<option ${t.status=="Pending"?"selected":""}>Pending</option>
<option ${t.status=="In Progress"?"selected":""}>In Progress</option>
<option ${t.status=="Completed"?"selected":""}>Completed</option>

</select>

<br>

Rating: ${t.rating || "Not rated"}

<br>

<button class="deleteBtn" onclick="deleteTask(${i})">Delete</button>

</div>
`;

});

}

function deleteTask(i){

tasks.splice(i,1);

save();

displayTasks();

}

function updateStatus(i,status){

tasks[i].status=status;

save();

displayTasks();

}

function loadTasks(){

let name=internName.value;

let myTasks=tasks.filter(t=>t.intern===name);

displayTasks(myTasks);

showProgress(myTasks);

}

function showProgress(list){

let total=list.length;

let done=list.filter(t=>t.status==="Completed").length;

let percent= total===0?0:Math.round(done/total*100);

progressArea.innerHTML=`

<h3>Progress</h3>

<div class="progressContainer">

<div class="progressBar" style="width:${percent}%">

${percent}%

</div>

</div>

<p>${done} of ${total} tasks completed</p>

`;

}

function filterDept(){

let dept=deptFilter.value;

let filtered=tasks.filter(t=>t.department===dept);

displayTasks(filtered);

}

displayTasks();

</script>

</body>

</html>
