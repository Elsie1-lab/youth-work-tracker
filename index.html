<!DOCTYPE html>
<html>

<head>
<title>Youth Remote Work Tracker</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f7f7fb;
color:#444;
}

/* COVER */

.cover{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#fcd5ff,#d7f3ff,#e6ffd7);
text-align:center;
}

.cover h1{
font-size:40px;
}

.cover button{
padding:12px 25px;
border:none;
border-radius:10px;
background:#8fa7ff;
color:white;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

/* APP */

.app{
display:none;
padding:40px;
}

.section{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

input,select{
padding:8px;
margin:5px;
border-radius:6px;
border:1px solid #ddd;
}

button{
padding:8px 12px;
background:#b8e6c3;
border:none;
border-radius:6px;
cursor:pointer;
}

.task{
background:#fff4ff;
border-left:6px solid #d9b3ff;
padding:10px;
margin-top:10px;
border-radius:6px;
}

.progressBar{
height:20px;
background:#eee;
border-radius:10px;
margin-top:10px;
}

.progress{
height:100%;
background:#a7e0c2;
border-radius:10px;
text-align:center;
font-size:12px;
}

.smallBtn{
background:#ffd6d6;
margin-left:5px;
}

</style>

</head>

<body>

<div class="cover" id="coverPage">

<h1>Youth Remote Work Tracker</h1>

<p>Track intern tasks, progress and performance</p>

<button onclick="enterApp()">Enter Dashboard</button>

</div>


<div class="app" id="appPage">

<div class="section">

<h2>Intern View</h2>

<input id="internName" placeholder="Enter your name">

<button onclick="loadTasks()">View My Tasks</button>

<div id="progressArea"></div>

</div>


<div class="section">

<h2>Supervisor Panel</h2>

<input id="taskTitle" placeholder="Task Title">

<input id="intern" placeholder="Intern Name">

<input id="department" placeholder="Department">

<input type="date" id="deadline">

<select id="status">
<option>Pending</option>
<option>In Progress</option>
<option>Completed</option>
</select>

<input id="rating" type="number" min="1" max="5" placeholder="Rating">

<button onclick="addTask()">Add Task</button>

<br><br>

Filter by Department:

<input id="filterDept" placeholder="Department name">

<button onclick="filterDepartment()">Filter</button>

</div>


<div class="section">

<h2>All Tasks</h2>

<div id="taskList"></div>

</div>

</div>


<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks(){
localStorage.setItem("tasks", JSON.stringify(tasks));
}

function enterApp(){
document.getElementById("coverPage").style.display="none";
document.getElementById("appPage").style.display="block";
displayTasks();
}

function addTask(){

const task = {

taskTitle:document.getElementById("taskTitle").value,
intern:document.getElementById("intern").value,
department:document.getElementById("department").value,
deadline:document.getElementById("deadline").value,
status:document.getElementById("status").value,
rating:document.getElementById("rating").value

};

tasks.push(task);

saveTasks();

displayTasks();

}

function displayTasks(list = tasks){

const taskList = document.getElementById("taskList");

taskList.innerHTML="";

list.forEach((task,index)=>{

taskList.innerHTML += `
<div class="task">

<b>${task.taskTitle}</b><br>

Intern: ${task.intern}<br>

Department: ${task.department}<br>

Deadline: ${task.deadline}<br>

Status:

<select onchange="updateStatus(${index},this.value)">

<option ${task.status=="Pending"?"selected":""}>Pending</option>
<option ${task.status=="In Progress"?"selected":""}>In Progress</option>
<option ${task.status=="Completed"?"selected":""}>Completed</option>

</select>

<br>

Rating: ${task.rating || "Not rated"}

<br><br>

<button class="smallBtn" onclick="deleteTask(${index})">Delete</button>

</div>
`;

});

}

function deleteTask(index){

tasks.splice(index,1);

saveTasks();

displayTasks();

}

function updateStatus(index,newStatus){

tasks[index].status=newStatus;

saveTasks();

displayTasks();

}

function loadTasks(){

const name=document.getElementById("internName").value;

const myTasks=tasks.filter(t=>t.intern===name);

displayTasks(myTasks);

calculateProgress(myTasks);

}

function calculateProgress(myTasks){

let total=myTasks.length;

let done=myTasks.filter(t=>t.status==="Completed").length;

let percent= total===0 ? 0 : Math.round((done/total)*100);

document.getElementById("progressArea").innerHTML=

`
<h3>Progress</h3>

<div class="progressBar">

<div class="progress" style="width:${percent}%">

${percent}%

</div>

</div>

<p>${done} of ${total} tasks completed</p>
`;

}

function filterDepartment(){

const dept=document.getElementById("filterDept").value;

const filtered=tasks.filter(t=>t.department===dept);

displayTasks(filtered);

}

displayTasks();

</script>

</body>
</html>
